<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Nuvem | BYD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --byd-blue: #0056b3; --byd-cyan: #00d2ff; --dark-bg: #050507; --card-bg: rgba(20, 22, 28, 0.9); --text-light: #ffffff; --text-muted: #a0aab5; }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--dark-bg); color: var(--text-light); min-height: 100vh; }
        .hidden { display: none !important; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 16px; max-width: 400px; width: 100%; text-align: center; }
        .admin-header { background: linear-gradient(135deg, #001a4d, #000000); padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .admin-container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .panel-section { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 30px; border-radius: 16px; margin-bottom: 30px; }
        .section-title { font-size: 18px; color: var(--byd-cyan); margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full-width { grid-column: span 2; }
        label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); }
        input, textarea { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #0d0f14; color: #fff; font-size: 14px; }
        textarea { min-height: 80px; resize: vertical; }
        .car-edit-row { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn-primary { display: block; width: 100%; background: linear-gradient(90deg, var(--byd-blue), var(--byd-cyan)); color: white; border: none; padding: 18px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .error-msg { color: #ff4a4a; font-size: 13px; margin-top: 10px; }
        .setup-box { background: rgba(210, 255, 0, 0.05); border: 1px dashed var(--byd-cyan); }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <i class="fas fa-lock" style="font-size: 40px; color: var(--byd-cyan); margin-bottom: 20px;"></i>
        <h2>Acesso Restrito Global</h2>
        <div class="form-group" style="margin: 20px 0;">
            <input type="password" id="passInput" placeholder="Senha de administrador" onkeydown="if(event.key === 'Enter') verificarSenha()">
        </div>
        <button class="btn-primary" onclick="verificarSenha()" style="padding: 12px; margin:0;">Entrar</button>
        <p id="errorMsg" class="error-msg hidden">Senha incorreta.</p>
    </div>
</div>

<div id="adminContent" class="hidden">
    <div class="admin-header">
        <h1>Painel de Gestão Nuvem (Global)</h1>
        <p style="color: var(--byd-cyan); font-size: 11px; margin-top: 5px;">ALTERAÇÕES VÃO PARA TODOS OS TELEMÓVEIS</p>
    </div>

    <div class="admin-container">
        <!-- CONFIGURAÇÃO DO GITHUB (Fica salvo só no teu browser por segurança) -->
        <div class="panel-section setup-box">
            <div class="section-title" style="color: #fff;"><i class="fab fa-github"></i> Conexão com o Servidor (Configurar uma vez)</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Teu Usuário do GitHub</label>
                    <input type="text" id="ghUser" placeholder="ex: lucasbyd">
                </div>
                <div class="form-group">
                    <label>Nome do Repositório</label>
                    <input type="text" id="ghRepo" placeholder="ex: showroom">
                </div>
                <div class="form-group full-width">
                    <label>GitHub Personal Token (Classic)</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
                </div>
            </div>
        </div>
        
        <div class="panel-section">
            <div class="section-title"><i class="fas fa-user-tie"></i> Dados do Consultor</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="admName">
                </div>
                <div class="form-group">
                    <label>Cargo</label>
                    <input type="text" id="admRole">
                </div>
                <div class="form-group">
                    <label>WhatsApp (Apenas números com DDD)</label>
                    <input type="text" id="admPhone">
                </div>
                <div class="form-group">
                    <label>Link Instagram</label>
                    <input type="text" id="admInstagram">
                </div>
                <div class="form-group full-width">
                    <label>URL da Imagem de Perfil</label>
                    <input type="text" id="admProfileImg">
                </div>
            </div>
        </div>

        <div class="panel-section">
            <div class="section-title"><i class="fas fa-car"></i> Veículos e Frases das Promoções</div>
            <div id="cars-edit-list">A carregar veículos...</div>
        </div>

        <button class="btn-primary" onclick="salvarNaNuvem()"><i class="fas fa-cloud-upload-alt"></i> Salvar e Atualizar Todos os Dispositivos</button>
    </div>
</div>

<script>
let currentData = {};

function verificarSenha() {
    if(document.getElementById('passInput').value === 'adm') {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('adminContent').classList.remove('hidden');
        
        // Recupera credenciais locais salvas no seu aparelho
        document.getElementById('ghUser').value = localStorage.getItem('gh_user') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || '';
        document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
        
        carregarDadosAtuais();
    } else {
        document.getElementById('errorMsg').classList.remove('hidden');
    }
}

async function carregarDadosAtuais() {
    try {
        // Puxa o arquivo atual direto do servidor para não apagar nada antigo
        const res = await fetch('dados.json?t=' + new Date().getTime());
        currentData = await res.json();
        
        document.getElementById('admName').value = currentData.profile.name;
        document.getElementById('admRole').value = currentData.profile.role;
        document.getElementById('admPhone').value = currentData.profile.phone;
        document.getElementById('admInstagram').value = currentData.profile.instagram;
        document.getElementById('admProfileImg').value = currentData.profile.image;

        const listContainer = document.getElementById('cars-edit-list');
        listContainer.innerHTML = '';
        currentData.cars.forEach(car => {
            listContainer.innerHTML += `
                <div class="car-edit-row">
                    <strong style="color: #fff; display:block; margin-bottom:10px;">${car.name}</strong>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Preço (R$)</label>
                            <input type="text" id="p-price-${car.id}" value="${car.price}">
                        </div>
                        <div class="form-group">
                            <label>Texto da Promoção / Condições</label>
                            <textarea id="p-desc-${car.id}">${car.details}</textarea>
                        </div>
                    </div>
                </div>`;
        });
    } catch(e) {
        alert("Erro ao ler dados.json. Certifica-te de que o arquivo já existe no GitHub.");
    }
}

async function salvarNaNuvem() {
    const user = document.getElementById('ghUser').value.trim();
    const repo = document.getElementById('ghRepo').value.trim();
    const token = document.getElementById('ghToken').value.trim();

    if(!user || !repo || !token) {
        alert("Por favor, preenche os campos do bloco do GitHub primeiro.");
        return;
    }

    // Salva configurações locais para não precisar digitar sempre
    localStorage.setItem('gh_user', user);
    localStorage.setItem('gh_repo', repo);
    localStorage.setItem('gh_token', token);

    // Atualiza objeto local
    currentData.profile.name = document.getElementById('admName').value;
    currentData.profile.role = document.getElementById('admRole').value;
    currentData.profile.phone = document.getElementById('admPhone').value;
    currentData.profile.instagram = document.getElementById('admInstagram').value;
    currentData.profile.image = document.getElementById('admProfileImg').value;

    currentData.cars.forEach(car => {
        car.price = document.getElementById(`p-price-${car.id}`).value;
        car.details = document.getElementById(`p-desc-${car.id}`).value;
    });

    const url = `https://api.github.com/repos/${user}/${repo}/contents/dados.json`;
    
    try {
        // 1. Pega o SHA do arquivo atual (exigência do GitHub)
        let sha = "";
        const resGet = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
        if(resGet.ok) {
            const fileMeta = await resGet.json();
            sha = fileMeta.sha;
        }

        // 2. Envia a atualização criptografada em Base64
        const jsonString = JSON.stringify(currentData, null, 2);
        const base64Content = btoa(unescape(encodeURIComponent(jsonString)));

        const resPut = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "Showroom atualizado via Painel Admin",
                content: base64Content,
                sha: sha || undefined
            })
        });

        if(resPut.ok) {
            alert("Sucesso! O GitHub recebeu as atualizações. Dentro de 1 a 2 minutos o site mudará para todos os clientes!");
        } else {
            const errData = await resPut.json();
            alert("Erro ao salvar no GitHub: " + errData.message);
        }
    } catch(e) {
        alert("Erro de conexão: " + e.message);
    }
}
</script>
</body>
</html>
