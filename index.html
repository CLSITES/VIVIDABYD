<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor Executivo BYD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --byd-blue: #0056b3; --byd-cyan: #00d2ff; --dark-bg: #050507; --card-bg: rgba(20, 22, 28, 0.8); --text-light: #ffffff; --text-muted: #a0aab5; }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--dark-bg); color: var(--text-light); background-image: radial-gradient(circle at top, #111827 0%, var(--dark-bg) 60%); min-height: 100vh; }
        .hidden { display: none !important; }
        header { padding: 60px 20px 40px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid transparent; background: linear-gradient(var(--dark-bg), var(--dark-bg)) padding-box, linear-gradient(45deg, var(--byd-blue), var(--byd-cyan)) border-box; object-fit: cover; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
        h2 { font-size: 14px; color: var(--byd-cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        .social-links { display: flex; justify-content: center; gap: 15px; }
        .social-links a { display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; background-color: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; color: var(--text-light); text-decoration: none; font-size: 18px; transition: all 0.3s ease; }
        .social-links a:hover { background-color: var(--text-light); color: var(--dark-bg); transform: translateY(-3px); }
        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        .section-title { text-align: center; font-size: 22px; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 3px; font-weight: 300; }
        .section-title strong { font-weight: 700; color: var(--byd-cyan); }
        .car-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media(min-width: 600px) { .car-grid { grid-template-columns: 1fr 1fr; } }
        @media(min-width: 900px) { .car-grid { grid-template-columns: 1fr 1fr 1fr; } }
        .car-card { background-color: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); transition: all 0.4s ease; display: flex; flex-direction: column; cursor: pointer; }
        .car-card:hover { transform: translateY(-8px); border-color: rgba(0, 210, 255, 0.3); }
        .car-img-wrapper { overflow: hidden; width: 100%; height: 220px; }
        .car-img { width: 100%; height: 100%; object-fit: cover; }
        .car-info { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; justify-content: center; position: relative; }
        .car-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .car-price { font-size: 22px; color: var(--byd-cyan); font-weight: 700; }
        .price-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #0d0f14; border-radius: 20px; max-width: 550px; width: 100%; padding: 40px; position: relative; border: 1px solid rgba(255, 255, 255, 0.1); max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 35px; color: var(--text-muted); cursor: pointer; background: none; border: none; }
        .modal-img { width: 100%; height: 280px; object-fit: cover; border-radius: 12px; margin-bottom: 25px; }
        .modal-title { font-size: 24px; margin-bottom: 5px; font-weight: 700; }
        .modal-price { font-size: 28px; color: var(--byd-cyan); font-weight: 700; margin-bottom: 25px; }
        .modal-desc { font-size: 15px; color: #d1d5db; line-height: 1.8; margin-bottom: 30px; white-space: pre-wrap; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 12px; border-left: 3px solid var(--byd-blue); }
        .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: linear-gradient(90deg, #25D366, #1ebe57); color: #ffffff; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 16px; text-transform: uppercase; cursor: pointer; border: none; }
        footer { text-align: center; padding: 30px 20px; border-top: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-muted); font-size: 13px; }
    </style>
</head>
<body>

<div>
    <header>
        <img src="" alt="Consultor" class="profile-img">
        <h1 id="profName">...</h1>
        <h2 id="profRole">...</h2>
        <div class="social-links">
            <a href="#" class="social-instagram" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" id="linkWhatsTopo" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="#" id="linkTelefone"><i class="fas fa-phone-alt"></i></a>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">Line-up <strong>BYD</strong></h2>
        <div class="car-grid" id="car-grid">A carregar showroom...</div>
    </div>
    
    <footer><p>Showroom Digital Exclusivo | BYD</p></footer>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-content">
        <button class="close-modal" onclick="fecharModal()">&times;</button>
        <img src="" class="modal-img" id="modalImg">
        <h3 class="modal-title" id="modalTitle"></h3>
        <p class="price-label">Valor Sugerido</p>
        <p class="modal-price" id="modalPrice"></p>
        <div class="modal-desc" id="modalDesc"></div>
        <button class="btn-whatsapp" id="modalBtnWhats"><i class="fab fa-whatsapp"></i> Solicitar Proposta</button>
    </div>
</div>

<script>
// Imagens fixas da BYD para os cards
const carImages = {
    1: "https://www.byd.com/material/byd-site/br/new_models_2026/Dolphin_Mini_New_Color_2_Desk.png",
    2: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/BYD_Seagull_001.jpg/800px-BYD_Seagull_001.jpg",
    3: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/BYD_Dolphin_002.jpg/800px-BYD_Dolphin_002.jpg",
    4: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/BYD_Dolphin_002.jpg/800px-BYD_Dolphin_002.jpg",
    5: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/BYD_Destroyer_05_001.jpg/800px-BYD_Destroyer_05_001.jpg",
    6: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/BYD_Destroyer_05_001.jpg/800px-BYD_Destroyer_05_001.jpg",
    7: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/BYD_Song_Pro_DM-i_001.jpg/800px-BYD_Song_Pro_DM-i_001.jpg",
    8: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/BYD_Song_Pro_DM-i_001.jpg/800px-BYD_Song_Pro_DM-i_001.jpg",
    9: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/BYD_Yuan_Pro_001.jpg/800px-BYD_Yuan_Pro_001.jpg",
    10: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/BYD_Yuan_Plus_002.jpg/800px-BYD_Yuan_Plus_002.jpg",
    11: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/BYD_Yuan_Plus_002.jpg/800px-BYD_Yuan_Plus_002.jpg",
    12: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/BYD_Song_Plus_DM-i_Champion_Edition_001.jpg/800px-BYD_Song_Plus_DM-i_Champion_Edition_001.jpg",
    13: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/BYD_Song_Plus_DM-i_Champion_Edition_001.jpg/800px-BYD_Song_Plus_DM-i_Champion_Edition_001.jpg",
    14: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/BYD_Seal_001.jpg/800px-BYD_Seal_001.jpg",
    15: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/BYD_Sea_Lion_07_001.jpg/800px-BYD_Sea_Lion_07_001.jpg",
    16: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/BYD_Shark_002.jpg/800px-BYD_Shark_002.jpg",
    17: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/BYD_Tang_EV_001.jpg/800px-BYD_Tang_EV_001.jpg"
};

let appData = {};

async function init() {
    try {
        // Puxa o JSON com timestamp para quebrar o cache do navegador
        const res = await fetch('dados.json?t=' + new Date().getTime());
        appData = await res.json();
        renderLayout();
    } catch(e) {
        document.getElementById('car-grid').innerText = "Erro ao carregar dados do showroom.";
    }
}

function renderLayout() {
    document.getElementById('profName').innerText = appData.profile.name;
    document.getElementById('profRole').innerText = appData.profile.role;
    
    const imgEl = document.querySelector('.profile-img');
    imgEl.src = appData.profile.image;
    imgEl.alt = appData.profile.name;
    
    const cleanPhone = appData.profile.phone.replace(/\D/g, '');
    document.getElementById('linkWhatsTopo').href = `https://wa.me/${cleanPhone}`;
    document.getElementById('linkTelefone').href = `tel:+${cleanPhone}`;
    
    const instaLink = document.querySelector('.social-instagram');
    if(appData.profile.instagram && appData.profile.instagram !== '#') {
        instaLink.href = appData.profile.instagram;
        instaLink.style.display = "flex";
    } else {
        instaLink.style.display = "none";
    }

    const grid = document.getElementById('car-grid');
    grid.innerHTML = '';
    appData.cars.forEach(car => {
        grid.innerHTML += `
            <div class="car-card" onclick="abrirModal(${car.id})">
                <div class="car-img-wrapper">
                    <img src="${carImages[car.id] || ''}" alt="${car.name}" class="car-img">
                </div>
                <div class="car-info">
                    <h3 class="car-title">${car.name}</h3>
                    <p class="price-label">A partir de</p>
                    <p class="car-price">R$ ${car.price}</p>
                </div>
            </div>`;
    });
}

function abrirModal(id) {
    const car = appData.cars.find(c => c.id === id);
    if(car) {
        document.getElementById('modalTitle').innerText = car.name;
        document.getElementById('modalPrice').innerText = `R$ ${car.price}`;
        document.getElementById('modalDesc').innerText = car.details;
        document.getElementById('modalImg').src = carImages[id] || '';
        
        const cleanPhone = appData.profile.phone.replace(/\D/g, '');
        const msg = `Olá ${appData.profile.name}, tenho interesse no ${car.name} (R$ ${car.price}). Pode enviar as condições?`;
        
        document.getElementById('modalBtnWhats').onclick = () => {
            window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        };
        document.getElementById('modalOverlay').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }
}

function fecharModal() {
    document.getElementById('modalOverlay').classList.add('hidden');
    document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
});

init();
</script>
</body>
</html>
